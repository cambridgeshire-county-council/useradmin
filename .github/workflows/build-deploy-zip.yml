name: Build Deploy Zip

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build-zip:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore PSScriptWebApp.sln

      - name: Test
        run: dotnet test PSScriptWebApp.sln -c Release --no-restore

      - name: Build
        run: dotnet build PSScriptWebApp.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish PSScriptWebApp.csproj -c Release --no-build -o out

      - name: Create zip and checksum
        id: package
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 8)
          $zipName = "PSScriptWebApp-$shortSha.zip"

          Compress-Archive -Path "out\*" -DestinationPath $zipName -Force

          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash
          "$hash *$zipName" | Out-File "$zipName.sha256" -Encoding ascii

          "zip_name=$zipName" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-zip
          path: |
            ${{ steps.package.outputs.zip_name }}
            ${{ steps.package.outputs.zip_name }}.sha256
          retention-days: 14
